[variables]
NODE_ENV = "production"
NIXPACKS_NODE_VERSION = "20"

[phases.setup]
nixPkgs = ["python3", "gcc", "gnumake"]

[phases.install]
cmds = ["corepack enable", "corepack prepare pnpm@8.15.9 --activate", "pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "pnpm start"