<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ccChipBody" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#232a36"/>
      <stop offset="60%" stop-color="#181d26"/>
      <stop offset="100%" stop-color="#0e1118"/>
    </radialGradient>
    <linearGradient id="ccEdgeGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#45e57f"/>
      <stop offset="50%" stop-color="#1fd65f"/>
      <stop offset="100%" stop-color="#12a344"/>
    </linearGradient>
    <linearGradient id="ccClover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dffab"/>
      <stop offset="45%" stop-color="#1fd65f"/>
      <stop offset="100%" stop-color="#0f8f3c"/>
    </linearGradient>
    <radialGradient id="ccFace" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#f2f7f4"/>
      <stop offset="70%" stop-color="#dfe8e2"/>
      <stop offset="100%" stop-color="#b8c6bd"/>
    </radialGradient>
    <linearGradient id="ccTopLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- chip body -->
  <circle cx="32" cy="32" r="30" fill="url(#ccChipBody)" stroke="#0a0d13" stroke-width="1.5"/>

  <!-- edge green segments (8) -->
  <g fill="url(#ccEdgeGreen)">
    <path d="M32 3.2 A28.8 28.8 0 0 1 43 5.4 L40.3 12 A21.8 21.8 0 0 0 32 10.4 Z"/>
    <path d="M52.3 11.7 A28.8 28.8 0 0 1 58.6 21 L52 23.7 A21.8 21.8 0 0 0 47.3 16.7 Z"/>
    <path d="M60.8 32 A28.8 28.8 0 0 1 58.6 43 L52 40.3 A21.8 21.8 0 0 0 53.6 32 Z"/>
    <path d="M52.3 52.3 A28.8 28.8 0 0 1 43 58.6 L40.3 52 A21.8 21.8 0 0 0 47.3 47.3 Z"/>
    <path d="M32 60.8 A28.8 28.8 0 0 1 21 58.6 L23.7 52 A21.8 21.8 0 0 0 32 53.6 Z"/>
    <path d="M11.7 52.3 A28.8 28.8 0 0 1 5.4 43 L12 40.3 A21.8 21.8 0 0 0 16.7 47.3 Z"/>
    <path d="M3.2 32 A28.8 28.8 0 0 1 5.4 21 L12 23.7 A21.8 21.8 0 0 0 10.4 32 Z"/>
    <path d="M11.7 11.7 A28.8 28.8 0 0 1 21 5.4 L23.7 12 A21.8 21.8 0 0 0 16.7 16.7 Z"/>
  </g>

  <!-- inner dark ring -->
  <circle cx="32" cy="32" r="21.8" fill="none" stroke="#0a0d13" stroke-width="1.2"/>

  <!-- inner face -->
  <circle cx="32" cy="32" r="19" fill="url(#ccFace)" stroke="#0f8f3c" stroke-width="0.8"/>
  <circle cx="32" cy="32" r="16.6" fill="none" stroke="#1fd65f" stroke-width="0.6" stroke-dasharray="2 1.6" opacity="0.55"/>

  <!-- four leaf clover emblem -->
  <g transform="translate(32 31.3)">
    <path d="M0 -1.5 C -1 -7.2 -8 -7.2 -7 -2.2 C -6.5 0.5 -2.7 1 0 -1.5 Z" fill="url(#ccClover)" transform="rotate(45)"/>
    <path d="M0 -1.5 C -1 -7.2 -8 -7.2 -7 -2.2 C -6.5 0.5 -2.7 1 0 -1.5 Z" fill="url(#ccClover)" transform="rotate(135)"/>
    <path d="M0 -1.5 C -1 -7.2 -8 -7.2 -7 -2.2 C -6.5 0.5 -2.7 1 0 -1.5 Z" fill="url(#ccClover)" transform="rotate(225)"/>
    <path d="M0 -1.5 C -1 -7.2 -8 -7.2 -7 -2.2 C -6.5 0.5 -2.7 1 0 -1.5 Z" fill="url(#ccClover)" transform="rotate(315)"/>
    <path d="M0.3 0.8 C 1.3 4.2 2.2 6 3.7 7.7 C 1.7 7 0.3 5.5 -0.5 3.7 Z" fill="url(#ccClover)"/>
    <circle cx="0" cy="0" r="1.1" fill="#0f8f3c"/>
  </g>

  <!-- 3D top light -->
  <ellipse cx="32" cy="18.5" rx="25" ry="14" fill="url(#ccTopLight)"/>
</svg>
